<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('{{marca.tipografia.google_fonts_url}}');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .canvas {
      width: {{__largura}}px;
      height: {{__altura}}px;
      background: {{marca.cores.secundaria}};
      font-family: '{{marca.tipografia.fonte_corpo}}', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }

    /* Linha decorativa diagonal */
    .canvas::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, {{marca.cores.primaria}}, {{marca.cores.destaque}});
    }

    /* Linhas decorativas laterais */
    .linha-esq, .linha-dir {
      position: absolute;
      width: 3px;
      height: 200px;
      opacity: 0.15;
    }

    .linha-esq {
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(to bottom, transparent, {{marca.cores.primaria}}, transparent);
    }

    .linha-dir {
      right: 60px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(to bottom, transparent, {{marca.cores.destaque}}, transparent);
    }

    .logo {
      position: absolute;
      top: 40px;
      left: 40px;
      height: 36px;
    }

    .tag {
      font-family: '{{marca.tipografia.fonte_titulo}}', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: {{marca.cores.primaria}};
      text-transform: uppercase;
      letter-spacing: 8px;
      margin-bottom: 24px;
      padding: 8px 24px;
      border: 2px solid {{marca.cores.primaria}};
      border-radius: 4px;
    }

    .titulo {
      font-family: '{{marca.tipografia.fonte_titulo}}', sans-serif;
      font-weight: {{marca.tipografia.peso_titulo}};
      font-size: 64px;
      color: {{marca.cores.texto_claro}};
      text-transform: uppercase;
      line-height: 1.05;
      margin-bottom: 24px;
      max-width: 85%;
    }

    .descricao {
      font-size: 24px;
      color: {{marca.cores.texto_claro}};
      opacity: 0.75;
      line-height: 1.5;
      max-width: 75%;
      margin-bottom: 32px;
    }

    .data {
      font-family: '{{marca.tipografia.fonte_titulo}}', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: {{marca.cores.destaque}};
      margin-bottom: 32px;
      letter-spacing: 2px;
    }

    .cta {
      padding: 18px 48px;
      background: linear-gradient(135deg, {{marca.cores.primaria}}, {{marca.cores.gradiente_fim}});
      color: {{marca.cores.texto_claro}};
      font-family: '{{marca.tipografia.fonte_titulo}}', sans-serif;
      font-weight: 700;
      font-size: 22px;
      border-radius: {{marca.estilo.borda_arredondada}};
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: {{marca.estilo.sombra}};
    }

    .rodape {
      position: absolute;
      bottom: 30px;
      font-size: 16px;
      color: {{marca.cores.texto_claro}};
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="linha-esq"></div>
    <div class="linha-dir"></div>
    <img class="logo" src="{{marca.empresa.logo}}" alt="Logo" />

    <div class="tag">{{#if subtitulo}}{{subtitulo}}{{else}}NOVO{{/if}}</div>

    <h1 class="titulo">{{titulo}}</h1>

    {{#if descricao}}
    <p class="descricao">{{descricao}}</p>
    {{/if}}

    {{#if data_lancamento}}
    <div class="data">{{data_lancamento}}</div>
    {{/if}}

    <div class="cta">{{#if cta}}{{cta}}{{else}}CONHEÇA AGORA{{/if}}</div>

    <div class="rodape">{{marca.redes.instagram}}</div>
  </div>
</body>
</html>
