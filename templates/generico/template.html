<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('{{marca.tipografia.google_fonts_url}}');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .canvas {
      width: {{__largura}}px;
      height: {{__altura}}px;
      background: {{#if cor_fundo}}{{cor_fundo}}{{else}}linear-gradient(135deg, {{marca.cores.gradiente_inicio}}, {{marca.cores.gradiente_fim}}){{/if}};
      font-family: '{{marca.tipografia.fonte_corpo}}', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: {{marca.estilo.espacamento}};
      position: relative;
      overflow: hidden;
    }

    .logo {
      position: absolute;
      top: 40px;
      left: 40px;
      height: 40px;
    }

    .conteudo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      max-width: 85%;
    }

    .titulo {
      font-family: '{{marca.tipografia.fonte_titulo}}', sans-serif;
      font-weight: {{marca.tipografia.peso_titulo}};
      font-size: 64px;
      color: {{marca.cores.texto_claro}};
      line-height: 1.1;
      text-transform: uppercase;
    }

    .subtitulo {
      font-size: 28px;
      color: {{marca.cores.texto_claro}};
      opacity: 0.9;
      line-height: 1.4;
      font-weight: {{marca.tipografia.peso_corpo}};
    }

    .cta {
      margin-top: 16px;
      padding: 16px 48px;
      background: {{marca.cores.texto_claro}};
      color: {{marca.cores.primaria}};
      font-family: '{{marca.tipografia.fonte_titulo}}', sans-serif;
      font-weight: 700;
      font-size: 22px;
      border-radius: {{marca.estilo.borda_arredondada}};
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .rodape {
      position: absolute;
      bottom: 40px;
      font-size: 18px;
      color: {{marca.cores.texto_claro}};
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <img class="logo" src="{{marca.empresa.logo}}" alt="Logo" />

    <div class="conteudo">
      <h1 class="titulo">{{titulo}}</h1>

      {{#if subtitulo}}
      <p class="subtitulo">{{subtitulo}}</p>
      {{/if}}

      {{#if cta}}
      <div class="cta">{{cta}}</div>
      {{/if}}
    </div>

    <div class="rodape">{{marca.redes.instagram}}</div>
  </div>
</body>
</html>
