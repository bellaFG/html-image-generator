<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('{{marca.tipografia.google_fonts_url}}');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .canvas {
      width: {{__largura}}px;
      height: {{__altura}}px;
      background: linear-gradient(160deg, {{marca.cores.secundaria}} 0%, {{marca.cores.secundaria}} 60%, {{marca.cores.primaria}} 100%);
      font-family: '{{marca.tipografia.fonte_corpo}}', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }

    /* Elemento decorativo */
    .canvas::before {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 45%;
      height: 45%;
      background: linear-gradient(135deg, transparent 0%, rgba(233, 30, 99, 0.15) 100%);
      border-top-left-radius: 50%;
    }

    .logo {
      position: absolute;
      top: 40px;
      left: 40px;
      height: 36px;
    }

    .tipo-evento {
      font-family: '{{marca.tipografia.fonte_titulo}}', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: {{marca.cores.destaque}};
      text-transform: uppercase;
      letter-spacing: 6px;
      margin-bottom: 20px;
    }

    .nome-evento {
      font-family: '{{marca.tipografia.fonte_titulo}}', sans-serif;
      font-weight: {{marca.tipografia.peso_titulo}};
      font-size: 56px;
      color: {{marca.cores.texto_claro}};
      text-transform: uppercase;
      line-height: 1.05;
      margin-bottom: 32px;
      max-width: 90%;
    }

    .descricao {
      font-size: 22px;
      color: {{marca.cores.texto_claro}};
      opacity: 0.75;
      line-height: 1.5;
      max-width: 80%;
      margin-bottom: 40px;
    }

    .info-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .info-icone {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .info-texto {
      font-size: 22px;
      color: {{marca.cores.texto_claro}};
      font-weight: 600;
    }

    .cta {
      padding: 18px 48px;
      background: {{marca.cores.destaque}};
      color: {{marca.cores.secundaria}};
      font-family: '{{marca.tipografia.fonte_titulo}}', sans-serif;
      font-weight: 700;
      font-size: 22px;
      border-radius: {{marca.estilo.borda_arredondada}};
      text-transform: uppercase;
      letter-spacing: 2px;
      z-index: 1;
    }

    .rodape {
      position: absolute;
      bottom: 30px;
      left: 80px;
      font-size: 16px;
      color: {{marca.cores.texto_claro}};
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <img class="logo" src="{{marca.empresa.logo}}" alt="Logo" />

    <div class="tipo-evento">{{#if tipo_evento}}{{tipo_evento}}{{else}}EVENTO{{/if}}</div>

    <h1 class="nome-evento">{{nome_evento}}</h1>

    {{#if descricao}}
    <p class="descricao">{{descricao}}</p>
    {{/if}}

    <div class="info-box">
      <div class="info-item">
        <div class="info-icone">📅</div>
        <span class="info-texto">{{data_evento}}</span>
      </div>

      {{#if horario}}
      <div class="info-item">
        <div class="info-icone">🕐</div>
        <span class="info-texto">{{horario}}</span>
      </div>
      {{/if}}

      {{#if local}}
      <div class="info-item">
        <div class="info-icone">📍</div>
        <span class="info-texto">{{local}}</span>
      </div>
      {{/if}}
    </div>

    <div class="cta">{{#if cta}}{{cta}}{{else}}INSCREVA-SE{{/if}}</div>

    <div class="rodape">{{marca.redes.instagram}}</div>
  </div>
</body>
</html>
