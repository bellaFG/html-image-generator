<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('{{marca.tipografia.google_fonts_url}}');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .canvas {
      width: {{__largura}}px;
      height: {{__altura}}px;
      background: {{#if cor_fundo}}{{cor_fundo}}{{else}}{{marca.cores.fundo}}{{/if}};
      font-family: '{{marca.tipografia.fonte_corpo}}', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }

    /* Barra colorida no topo */
    .canvas::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(90deg, {{marca.cores.primaria}}, {{marca.cores.destaque}});
    }

    .logo {
      position: absolute;
      top: 40px;
      left: 40px;
      height: 36px;
    }

    .aspas {
      font-family: Georgia, serif;
      font-size: 160px;
      color: {{marca.cores.primaria}};
      opacity: 0.2;
      line-height: 0.6;
      margin-bottom: 16px;
    }

    .depoimento {
      font-family: '{{marca.tipografia.fonte_corpo}}', sans-serif;
      font-weight: {{marca.tipografia.peso_corpo}};
      font-size: 32px;
      color: {{marca.cores.texto}};
      line-height: 1.5;
      max-width: 85%;
      margin-bottom: 40px;
      font-style: italic;
    }

    .estrelas {
      font-size: 36px;
      margin-bottom: 24px;
      letter-spacing: 4px;
    }

    .divisor {
      width: 60px;
      height: 3px;
      background: {{marca.cores.primaria}};
      margin-bottom: 24px;
    }

    .nome-cliente {
      font-family: '{{marca.tipografia.fonte_titulo}}', sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: {{marca.cores.texto}};
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .cargo-cliente {
      font-size: 18px;
      color: {{marca.cores.texto}};
      opacity: 0.6;
      margin-top: 8px;
    }

    .rodape {
      position: absolute;
      bottom: 30px;
      font-size: 16px;
      color: {{marca.cores.texto}};
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <img class="logo" src="{{marca.empresa.logo}}" alt="Logo" />

    <div class="aspas">"</div>

    <p class="depoimento">{{depoimento}}</p>

    {{#if estrelas}}
    <div class="estrelas">{{#stars estrelas}}{{/stars}}</div>
    {{/if}}

    <div class="divisor"></div>

    <div class="nome-cliente">{{nome_cliente}}</div>

    {{#if cargo_cliente}}
    <div class="cargo-cliente">{{cargo_cliente}}</div>
    {{/if}}

    <div class="rodape">{{marca.redes.instagram}}</div>
  </div>
</body>
</html>
