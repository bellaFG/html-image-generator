<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .canvas {
      width: 1080px;
      height: 1080px;
      background: #FFFFFF;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Grande forma organica azul — ocupa metade inferior direita */
    .shape-main {
      position: absolute;
      width: 900px;
      height: 900px;
      border-radius: 40% 60% 65% 35% / 50% 40% 60% 50%;
      background: linear-gradient(145deg, #1B6BC5, #033860);
      bottom: -180px;
      right: -200px;
      z-index: 1;
    }

    /* Forma verde menor — overlap com a azul */
    .shape-green {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50% 50% 50% 50% / 45% 55% 45% 55%;
      background: #2A7221;
      bottom: 60px;
      right: 40px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Numero dentro do circulo verde */
    .shape-green .number {
      font-weight: 900;
      font-size: 96px;
      color: #FFFFFF;
      line-height: 1;
      text-align: center;
    }

    .shape-green .number-label {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      text-align: center;
      margin-top: 4px;
    }

    .shape-green .number-block {
      text-align: center;
    }

    /* Green bar topo */
    .green-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #6ED161, #2A7221);
      z-index: 20;
    }

    /* Logo topo esquerdo */
    .logo {
      position: absolute;
      top: 48px; left: 56px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 20;
    }
    .logo svg { width: 22px; height: 22px; }
    .logo span { font-weight: 700; font-size: 18px; color: #033860; }

    /* Texto principal — lado esquerdo sobre fundo branco */
    .content {
      position: absolute;
      top: 140px;
      left: 56px;
      width: 580px;
      z-index: 10;
    }

    .kicker {
      font-size: 13px;
      font-weight: 700;
      color: #2A7221;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 28px;
    }

    .title {
      font-weight: 900;
      font-size: 58px;
      line-height: 1.05;
      color: #033860;
      margin-bottom: 28px;
    }

    .title em {
      font-style: italic;
      color: #2A7221;
    }

    .desc {
      font-size: 20px;
      font-weight: 400;
      color: #475569;
      line-height: 1.65;
      max-width: 460px;
    }

    .desc strong {
      color: #033860;
      font-weight: 700;
    }

    /* Texto sobre a forma azul — parte inferior esquerda */
    .over-blue {
      position: absolute;
      bottom: 56px;
      left: 56px;
      z-index: 10;
    }

    .cta {
      font-size: 17px;
      font-weight: 700;
      color: #6ED161;
      letter-spacing: 0.3px;
    }

    .bottom-info {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="green-bar"></div>

    <!-- Formas organicas -->
    <div class="shape-main"></div>
    <div class="shape-green">
      <div class="number-block">
        <div class="number">40%</div>
        <div class="number-label">mais rapido</div>
      </div>
    </div>

    <!-- Logo -->
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M16 2L18.8 12L28 8L20 16L28 24L18.8 20L16 30L13.2 20L4 24L12 16L4 8L13.2 12L16 2Z" fill="#2A7221"/>
      </svg>
      <span>maino</span>
    </div>

    <!-- Texto principal -->
    <div class="content">
      <div class="kicker">Desembaraco aduaneiro</div>
      <h1 class="title">
        Sua carga<br>
        nao precisa<br>
        ficar <em>parada<br>
        no porto.</em>
      </h1>
      <p class="desc">
        Com <strong>despacho antecipado e catalogo
        de produtos</strong>, sua importacao libera
        antes mesmo da chegada da mercadoria.
      </p>
    </div>

    <!-- CTA sobre a area azul -->
    <div class="over-blue">
      <div class="cta">Acelere sua operacao →</div>
      <div class="bottom-info">maino.com.br · @mainotecnologia</div>
    </div>
  </div>
</body>
</html>
