<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .canvas {
      width: 1080px;
      height: 1080px;
      background: #021B30;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* ===== ROUNDED BACKGROUND SHAPES ===== */

    /* Big main circle - top right */
    .shape-1 {
      position: absolute;
      width: 680px;
      height: 680px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0A3D6B 0%, #064A7A 50%, #033860 100%);
      top: -80px;
      right: -120px;
      z-index: 1;
    }

    /* Medium circle - overlapping left */
    .shape-2 {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: linear-gradient(200deg, rgba(110, 209, 97, 0.12) 0%, rgba(42, 114, 33, 0.05) 100%);
      top: 180px;
      right: 280px;
      z-index: 2;
    }

    /* Small accent circle - green */
    .shape-3 {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #2A7221;
      top: 60px;
      right: 90px;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Small circle bottom */
    .shape-4 {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(110, 209, 97, 0.08);
      bottom: 160px;
      right: 80px;
      z-index: 2;
    }

    /* Tiny dot accent */
    .shape-5 {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #6ED161;
      top: 300px;
      right: 520px;
      z-index: 3;
    }

    .shape-6 {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(110, 209, 97, 0.3);
      top: 140px;
      right: 340px;
      z-index: 3;
    }

    /* Bottom blob */
    .shape-7 {
      position: absolute;
      width: 500px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(27, 107, 197, 0.08) 0%, transparent 70%);
      bottom: -80px;
      left: -60px;
      z-index: 1;
    }

    /* Ring (circle with border only) */
    .ring-1 {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 2px solid rgba(110, 209, 97, 0.1);
      top: 380px;
      right: -40px;
      z-index: 2;
    }

    .ring-2 {
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 1.5px solid rgba(27, 107, 197, 0.12);
      bottom: 220px;
      left: 60px;
      z-index: 2;
    }

    /* Icon inside green circle */
    .shape-3 svg {
      width: 72px;
      height: 72px;
      opacity: 0.9;
    }

    /* Green bar topo */
    .green-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #6ED161, #41AE32);
      z-index: 20;
    }

    /* Grain */
    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.025;
      z-index: 15;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
    }

    /* Logo */
    .logo {
      position: absolute;
      top: 48px;
      left: 56px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 20;
    }

    .logo svg { width: 24px; height: 24px; }
    .logo span {
      font-weight: 700;
      font-size: 19px;
      color: rgba(255,255,255,0.8);
    }

    /* Text content - left side */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 65%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 64px;
      z-index: 10;
    }

    .kicker {
      font-size: 13px;
      font-weight: 700;
      color: #6ED161;
      text-transform: uppercase;
      letter-spacing: 4.5px;
      margin-bottom: 24px;
    }

    .title {
      font-weight: 900;
      font-size: 62px;
      line-height: 1.0;
      color: #FFFFFF;
      text-transform: uppercase;
      margin-bottom: 28px;
      letter-spacing: -1px;
    }

    .title em {
      font-style: italic;
      color: #6ED161;
    }

    .desc {
      font-size: 20px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      max-width: 520px;
      margin-bottom: 40px;
    }

    .desc strong {
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }

    .cta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cta-text {
      font-size: 17px;
      font-weight: 700;
      color: #6ED161;
    }

    .cta-arrow {
      font-size: 20px;
      color: #6ED161;
    }

    /* Bottom */
    .bottom {
      position: absolute;
      bottom: 44px;
      left: 64px;
      right: 64px;
      display: flex;
      justify-content: space-between;
      z-index: 20;
    }

    .bottom span {
      font-size: 12px;
      color: rgba(255,255,255,0.18);
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="green-bar"></div>
    <div class="grain"></div>

    <!-- Rounded background shapes -->
    <div class="shape-1"></div>
    <div class="shape-2"></div>
    <div class="shape-3">
      <!-- Container/box icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
    </div>
    <div class="shape-4"></div>
    <div class="shape-5"></div>
    <div class="shape-6"></div>
    <div class="shape-7"></div>
    <div class="ring-1"></div>
    <div class="ring-2"></div>

    <!-- Logo -->
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M16 2L18.8 12L28 8L20 16L28 24L18.8 20L16 30L13.2 20L4 24L12 16L4 8L13.2 12L16 2Z" fill="#6ED161"/>
      </svg>
      <span>maino</span>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="kicker">ERP de Comex</div>
      <h1 class="title">
        Sua operacao<br>
        ainda depende<br>
        <em>de planilha?</em>
      </h1>
      <p class="desc">
        <strong>Classificacao fiscal, controle de custos e
        acompanhamento de embarques</strong> — tudo em um
        unico sistema feito pra quem importa.
      </p>
      <div class="cta">
        <span class="cta-text">Fale com um especialista</span>
        <span class="cta-arrow">→</span>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom">
      <span>maino.com.br</span>
      <span>@mainotecnologia</span>
    </div>
  </div>
</body>
</html>
