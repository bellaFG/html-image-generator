<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .canvas {
      width: 1080px;
      height: 1080px;
      background: #033860;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Big blue circle background - like post 3 */
    .big-circle {
      position: absolute;
      width: 920px;
      height: 920px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 45%, #1B6BC5 0%, #0A4D8C 50%, #033860 100%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -48%);
    }

    /* Green side strip */
    .green-strip {
      position: absolute;
      right: 0;
      top: 0;
      width: 60px;
      height: 100%;
      background: #6ED161;
      z-index: 5;
    }

    /* Logo top center */
    .logo {
      position: absolute;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .logo svg {
      width: 28px;
      height: 28px;
    }

    .logo span {
      font-weight: 700;
      font-size: 22px;
      color: #FFFFFF;
      letter-spacing: -0.3px;
    }

    /* Main headline - BIG, bold, italic, fills the space */
    .headline {
      position: absolute;
      bottom: 160px;
      left: 72px;
      right: 120px;
      z-index: 10;
    }

    .headline h1 {
      font-weight: 900;
      font-size: 82px;
      line-height: 0.95;
      color: #FFFFFF;
      text-transform: uppercase;
      font-style: italic;
    }

    .headline h1 .green {
      color: #6ED161;
    }

    .headline p {
      margin-top: 24px;
      font-size: 22px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.5;
      max-width: 580px;
    }

    /* Floating document illustrations - like post 3 */
    .docs {
      position: absolute;
      top: 140px;
      left: 50%;
      transform: translateX(-40%);
      z-index: 6;
    }

    .doc {
      position: absolute;
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .doc-1 {
      width: 200px;
      height: 260px;
      top: 0;
      left: 0;
      transform: rotate(6deg);
    }

    .doc-2 {
      width: 180px;
      height: 240px;
      top: 20px;
      left: -160px;
      transform: rotate(-8deg);
    }

    .doc-3 {
      width: 170px;
      height: 220px;
      top: -10px;
      left: 160px;
      transform: rotate(12deg);
    }

    /* Doc inner content simulation */
    .doc-header {
      height: 40px;
      background: #033860;
      border-radius: 12px 12px 0 0;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 6px;
    }

    .doc-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
    }

    .doc-lines {
      padding: 16px;
    }

    .doc-line {
      height: 8px;
      background: #E2E8F0;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    .doc-line.short { width: 60%; }
    .doc-line.medium { width: 85%; }
    .doc-line.long { width: 100%; }
    .doc-line.green-line { background: #6ED161; width: 45%; height: 10px; }
    .doc-line.blue-line { background: #1B6BC5; width: 70%; }
    .doc-line.orange-line { background: #F97316; width: 55%; height: 10px; }

    /* Chart bars in one doc */
    .doc-chart {
      padding: 16px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      height: calc(100% - 40px);
    }

    .bar {
      width: 24px;
      border-radius: 4px 4px 0 0;
    }

    .bar-1 { height: 50px; background: #1B6BC5; }
    .bar-2 { height: 90px; background: #033860; }
    .bar-3 { height: 70px; background: #1B6BC5; }
    .bar-4 { height: 120px; background: #6ED161; }
    .bar-5 { height: 85px; background: #033860; }

    /* Warning triangle on docs */
    .warning {
      position: absolute;
      top: -15px;
      left: -20px;
      width: 56px;
      height: 56px;
      z-index: 8;
    }

    .warning-bg {
      width: 56px;
      height: 56px;
      background: #DC2626;
      border-radius: 12px;
      transform: rotate(0deg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .warning-bg span {
      color: #FFFFFF;
      font-size: 30px;
      font-weight: 900;
    }

    /* Arrow/check between old and new */
    .arrow-badge {
      position: absolute;
      top: 130px;
      left: -30px;
      z-index: 9;
    }

    .arrow-circle {
      width: 52px;
      height: 52px;
      background: #6ED161;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(110, 209, 97, 0.4);
    }

    /* Tag pill */
    .tag {
      position: absolute;
      bottom: 52px;
      left: 72px;
      z-index: 10;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .tag-pill {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #FFFFFF;
      font-size: 15px;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 999px;
    }

    .tag-pill.active {
      background: #6ED161;
      border-color: #6ED161;
      color: #033860;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <!-- Big circle bg -->
    <div class="big-circle"></div>

    <!-- Green side strip -->
    <div class="green-strip"></div>

    <!-- Logo -->
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M16 2L18.8 12L28 8L20 16L28 24L18.8 20L16 30L13.2 20L4 24L12 16L4 8L13.2 12L16 2Z" fill="#6ED161"/>
      </svg>
      <span>maino</span>
    </div>

    <!-- Floating documents -->
    <div class="docs">
      <!-- Doc with warning (old DI) -->
      <div class="doc doc-2">
        <div class="warning">
          <div class="warning-bg"><span>!</span></div>
        </div>
        <div class="doc-header">
          <div class="doc-dot"></div>
          <div class="doc-dot"></div>
          <div class="doc-dot"></div>
        </div>
        <div class="doc-lines">
          <div class="doc-line long"></div>
          <div class="doc-line medium"></div>
          <div class="doc-line short"></div>
          <div class="doc-line long"></div>
          <div class="doc-line orange-line"></div>
          <div class="doc-line medium"></div>
          <div class="doc-line short"></div>
        </div>
      </div>

      <!-- Doc with chart -->
      <div class="doc doc-1">
        <div class="doc-header">
          <div class="doc-dot"></div>
          <div class="doc-dot"></div>
          <div class="doc-dot"></div>
        </div>
        <div class="doc-chart">
          <div class="bar bar-1"></div>
          <div class="bar bar-2"></div>
          <div class="bar bar-3"></div>
          <div class="bar bar-4"></div>
          <div class="bar bar-5"></div>
        </div>
        <div class="arrow-badge">
          <div class="arrow-circle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#033860" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
      </div>

      <!-- Doc with lines (new DUIMP) -->
      <div class="doc doc-3">
        <div class="doc-header">
          <div class="doc-dot"></div>
          <div class="doc-dot"></div>
          <div class="doc-dot"></div>
        </div>
        <div class="doc-lines">
          <div class="doc-line long"></div>
          <div class="doc-line green-line"></div>
          <div class="doc-line medium"></div>
          <div class="doc-line short"></div>
          <div class="doc-line long"></div>
          <div class="doc-line blue-line"></div>
          <div class="doc-line medium"></div>
        </div>
      </div>
    </div>

    <!-- Main headline -->
    <div class="headline">
      <h1>
        A <span class="green">DUIMP</span><br>
        SUBSTITUIU<br>
        A DI E A DSI.
      </h1>
      <p>E nao e so uma troca de sigla. O novo<br>processo muda como voce importa.</p>
    </div>

    <!-- Bottom tags -->
    <div class="tag">
      <span class="tag-pill active">COMEX</span>
      <span class="tag-pill">Portal Unico Siscomex</span>
      <span class="tag-pill">2026</span>
    </div>
  </div>
</body>
</html>
