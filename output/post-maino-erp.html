<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .canvas {
      width: 1080px;
      height: 1080px;
      background: #021B30;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Green strip lateral */
    .green-strip {
      position: absolute;
      left: 0;
      top: 0;
      width: 7px;
      height: 100%;
      background: linear-gradient(180deg, #6ED161, #2A7221);
      z-index: 10;
    }

    /* Green bar topo */
    .green-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #6ED161, #41AE32);
      z-index: 10;
    }

    /* Big decorative circle */
    .circle-bg {
      position: absolute;
      width: 850px;
      height: 850px;
      border-radius: 50%;
      background: radial-gradient(circle at 45% 45%, rgba(27, 107, 197, 0.18) 0%, rgba(3, 56, 96, 0.08) 60%, transparent 100%);
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%);
    }

    /* Subtle green glow bottom-left */
    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(110, 209, 97, 0.07) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
    }

    /* Grain */
    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      z-index: 5;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
    }

    /* Logo */
    .logo {
      position: absolute;
      top: 48px;
      left: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .logo svg { width: 24px; height: 24px; }
    .logo span {
      font-weight: 700;
      font-size: 19px;
      color: rgba(255,255,255,0.8);
    }

    /* Content */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 72px;
      z-index: 10;
    }

    .kicker {
      font-size: 14px;
      font-weight: 700;
      color: #6ED161;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 28px;
    }

    .title {
      font-weight: 900;
      font-size: 68px;
      line-height: 0.96;
      color: #FFFFFF;
      text-transform: uppercase;
      margin-bottom: 32px;
      letter-spacing: -1.5px;
    }

    .title em {
      font-style: italic;
      color: #6ED161;
    }

    .title .thin {
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      font-size: 62px;
    }

    /* Divider line */
    .divider {
      width: 80px;
      height: 4px;
      background: #2A7221;
      border-radius: 2px;
      margin-bottom: 28px;
    }

    .desc {
      font-size: 22px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      max-width: 650px;
      margin-bottom: 48px;
    }

    .desc strong {
      color: rgba(255,255,255,0.85);
      font-weight: 600;
    }

    /* CTA - just text, not a button */
    .cta {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .cta-text {
      font-size: 18px;
      font-weight: 700;
      color: #6ED161;
      letter-spacing: 0.5px;
    }

    .cta-arrow {
      color: #6ED161;
      font-size: 22px;
    }

    /* Bottom info */
    .bottom-info {
      position: absolute;
      bottom: 48px;
      left: 72px;
      right: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .bottom-info span {
      font-size: 13px;
      color: rgba(255,255,255,0.2);
    }

    /* Floating decorative numbers */
    .big-number {
      position: absolute;
      top: 100px;
      right: 60px;
      font-weight: 900;
      font-size: 220px;
      color: rgba(110, 209, 97, 0.04);
      line-height: 1;
      letter-spacing: -10px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="green-strip"></div>
    <div class="green-bar"></div>
    <div class="circle-bg"></div>
    <div class="glow"></div>
    <div class="grain"></div>

    <!-- Decorative background number -->
    <div class="big-number">ERP</div>

    <!-- Logo -->
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M16 2L18.8 12L28 8L20 16L28 24L18.8 20L16 30L13.2 20L4 24L12 16L4 8L13.2 12L16 2Z" fill="#6ED161"/>
      </svg>
      <span>maino</span>
    </div>

    <!-- Main content -->
    <div class="content">
      <div class="kicker">Comex inteligente</div>
      <h1 class="title">
        <span class="thin">Sua importacao</span><br>
        <span class="thin">ainda depende</span><br>
        <em>de planilha?</em>
      </h1>
      <div class="divider"></div>
      <p class="desc">
        <strong>Erros de classificacao, multas surpresa e
        margem evaporando</strong> — tudo porque o controle
        nao acompanha a operacao.
      </p>
      <div class="cta">
        <span class="cta-text">Conheca o ERP que entende comex</span>
        <span class="cta-arrow">→</span>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom-info">
      <span>maino.com.br</span>
      <span>@mainotecnologia</span>
    </div>
  </div>
</body>
</html>
