<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .canvas {
      width: 1080px;
      height: 1080px;
      background: #021B30;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Green bar topo */
    .green-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #6ED161, #41AE32);
      z-index: 20;
    }

    /* Blob organico atras do numero — mesma linguagem de cor */
    .blob {
      position: absolute;
      width: 620px;
      height: 620px;
      border-radius: 35% 65% 55% 45% / 40% 50% 50% 60%;
      background: radial-gradient(circle at 40% 40%, #0A3D6B, #033860);
      top: 50%;
      left: 50%;
      transform: translate(-45%, -50%);
      z-index: 1;
    }

    /* Segundo blob menor — repeticao de forma */
    .blob-2 {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 60% 40% 50% 50% / 45% 55% 45% 55%;
      background: rgba(42, 114, 33, 0.12);
      bottom: 80px;
      left: 40px;
      z-index: 1;
    }

    /* Circulo de acento — repeticao de forma organica */
    .accent-circle {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid rgba(110, 209, 97, 0.15);
      top: 100px;
      right: 80px;
      z-index: 1;
    }

    /* Grain */
    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.025;
      z-index: 15;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
    }

    /* Logo */
    .logo {
      position: absolute;
      top: 44px; left: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 20;
    }
    .logo svg { width: 24px; height: 24px; }
    .logo span { font-weight: 700; font-size: 19px; color: rgba(255,255,255,0.8); }

    /* ===== COMPOSICAO CENTRAL ===== */
    .composition {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 0 72px;
    }

    /* Kicker — texto pequeno cima */
    .kicker {
      font-size: 13px;
      font-weight: 700;
      color: #6ED161;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 40px;
      text-align: center;
    }

    /* Pergunta — texto medio */
    .question {
      font-weight: 500;
      font-size: 28px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    /* NUMERO GIGANTE — o protagonista visual */
    .big-number {
      font-weight: 900;
      font-size: 148px;
      color: #FFFFFF;
      text-align: center;
      line-height: 0.9;
      letter-spacing: -4px;
      margin-bottom: 8px;
    }

    .big-number .currency {
      font-size: 72px;
      font-weight: 700;
      color: #6ED161;
      letter-spacing: -1px;
      vertical-align: top;
      line-height: 1.8;
    }

    /* Label do numero */
    .number-label {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 6px;
      margin-bottom: 44px;
    }

    /* Contexto */
    .context {
      font-size: 22px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      text-align: center;
      line-height: 1.6;
      max-width: 580px;
      margin-bottom: 40px;
    }

    .context strong {
      color: rgba(255,255,255,0.85);
      font-weight: 700;
    }

    /* CTA */
    .cta {
      font-size: 16px;
      font-weight: 700;
      color: #6ED161;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Bottom */
    .bottom {
      position: absolute;
      bottom: 40px;
      left: 56px;
      right: 56px;
      display: flex;
      justify-content: space-between;
      z-index: 20;
    }
    .bottom span { font-size: 12px; color: rgba(255,255,255,0.18); }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="green-bar"></div>
    <div class="grain"></div>
    <div class="blob"></div>
    <div class="blob-2"></div>
    <div class="accent-circle"></div>

    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M16 2L18.8 12L28 8L20 16L28 24L18.8 20L16 30L13.2 20L4 24L12 16L4 8L13.2 12L16 2Z" fill="#6ED161"/>
      </svg>
      <span>maino</span>
    </div>

    <div class="composition">
      <div class="kicker">Classificacao fiscal</div>

      <div class="question">Voce sabe quanto custa<br>um NCM errado?</div>

      <div class="big-number">
        <span class="currency">R$</span>10mil
      </div>
      <div class="number-label">Multa minima por operacao</div>

      <div class="context">
        <strong>Um unico erro de classificacao</strong> pode
        gerar multa de ate 1% do valor aduaneiro — sem
        contar retrabalho, atraso e perda de canal verde.
      </div>

      <div class="cta">Classifique com seguranca →</div>
    </div>

    <div class="bottom">
      <span>maino.com.br</span>
      <span>@mainotecnologia</span>
    </div>
  </div>
</body>
</html>
